# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - nyaysarthi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      # 1. Build React Frontend
      # ──────────────────────────────────────────────
      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install frontend dependencies
        working-directory: ./app/frontend
        run: npm install

      - name: Build frontend
        working-directory: ./app/frontend
        run: npm run build

      # ──────────────────────────────────────────────
      # 2. Copy frontend build into backend/public
      # ──────────────────────────────────────────────
      - name: Copy frontend build to backend public folder
        run: |
          mkdir -p ./app/backend/public
          cp -r ./app/frontend/dist/* ./app/backend/public/

      # ──────────────────────────────────────────────
      # 3. Install backend dependencies (production)
      # ──────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm install --production

      # ──────────────────────────────────────────────
      # 4. Zip and upload artifact (backend only)
      # ──────────────────────────────────────────────
      - name: Zip artifact for deployment
        working-directory: ./app/backend
        run: zip -r ../../release.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    permissions:
      id-token: write   # Required for requesting the JWT

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'nyaysarthi'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: .
