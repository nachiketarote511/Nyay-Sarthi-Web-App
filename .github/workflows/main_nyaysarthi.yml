name: Build and Deploy NyaySarthi to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: 20.x

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------
      # Checkout Repository
      # ----------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ----------------------------------------------------
      # Setup Node.js
      # ----------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            app/frontend/package-lock.json
            app/backend/package-lock.json

      # ----------------------------------------------------
      # Install Frontend
      # ----------------------------------------------------
      - name: Install Frontend Dependencies
        working-directory: app/frontend
        run: npm ci

      # ----------------------------------------------------
      # Build Frontend
      # ----------------------------------------------------
      - name: Build Frontend
        working-directory: app/frontend
        run: npm run build

      # ----------------------------------------------------
      # Copy React Build
      # ----------------------------------------------------
      - name: Copy Frontend Build
        run: |
          rm -rf app/backend/public
          mkdir -p app/backend/public
          cp -R app/frontend/dist/. app/backend/public/

      # ----------------------------------------------------
      # Install Backend
      # ----------------------------------------------------
      - name: Install Backend Dependencies
        working-directory: app/backend
        run: npm ci --omit=dev

      # ----------------------------------------------------
      # Remove Unnecessary Files
      # ----------------------------------------------------
      - name: Clean Deployment Package
        working-directory: app/backend
        run: |
          rm -rf \
            tests \
            docs \
            coverage \
            .git \
            .github \
            .vscode \
            logs \
            temp \
            cache

      # ----------------------------------------------------
      # Create Deployment ZIP
      # ----------------------------------------------------
      - name: Create Deployment ZIP
        run: |
          cd app/backend
          zip -r ../../release.zip . \
            -x "*.git*" \
            "*.github*" \
            "*.vscode*" \
            "*.DS_Store"

      # ----------------------------------------------------
      # Show ZIP Size
      # ----------------------------------------------------
      - name: Display ZIP Size
        run: ls -lh release.zip

      # ----------------------------------------------------
      # Upload Artifact
      # ----------------------------------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: Production
      url: ${{ steps.deploy.outputs.webapp-url }}

    permissions:
      id-token: write

    steps:

      # ----------------------------------------------------
      # Download Artifact
      # ----------------------------------------------------
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # ----------------------------------------------------
      # Azure Login
      # ----------------------------------------------------
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      # ----------------------------------------------------
      # Deploy
      # ----------------------------------------------------
      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: nyaysarthi
          slot-name: Production
          package: release.zip

      # ----------------------------------------------------
      # Deployment Success
      # ----------------------------------------------------
      - name: Deployment Complete
        run: echo "Deployment Finished Successfully."