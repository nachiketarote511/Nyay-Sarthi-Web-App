name: Build and Deploy Nyay Sarthi to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20.x"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # Checkout Repository
      # ------------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ------------------------------------------------------------
      # Setup Node.js
      # ------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            app/frontend/package-lock.json
            app/backend/package-lock.json

      # ------------------------------------------------------------
      # Install Frontend Dependencies
      # ------------------------------------------------------------
      - name: Install Frontend Dependencies
        working-directory: app/frontend
        run: npm ci

      # ------------------------------------------------------------
      # Build React Frontend
      # ------------------------------------------------------------
      - name: Build Frontend
        working-directory: app/frontend
        run: npm run build

      # ------------------------------------------------------------
      # Copy React Build to Backend Public Folder
      # ------------------------------------------------------------
      - name: Copy Frontend Build
        run: |
          rm -rf app/backend/public
          mkdir -p app/backend/public
          cp -R app/frontend/dist/. app/backend/public/

      # ------------------------------------------------------------
      # Install Backend Dependencies
      # ------------------------------------------------------------
      - name: Install Backend Dependencies
        working-directory: app/backend
        run: npm ci --omit=dev

      # ------------------------------------------------------------
      # Remove Files Not Needed in Deployment
      # ------------------------------------------------------------
      - name: Clean Deployment Package
        working-directory: app/backend
        run: |
          rm -rf \
            .git \
            .github \
            .vscode \
            tests \
            docs \
            coverage \
            logs \
            temp \
            cache

      # ------------------------------------------------------------
      # Create Deployment ZIP
      # ------------------------------------------------------------
      - name: Create Deployment ZIP
        run: |
          cd app/backend
          zip -r ../../release.zip . \
            -x "*.git*" \
            -x "*.github*" \
            -x "*.vscode*" \
            -x "*.DS_Store"

      # ------------------------------------------------------------
      # Display ZIP Size
      # ------------------------------------------------------------
      - name: Show Deployment Package Size
        run: ls -lh release.zip

      # ------------------------------------------------------------
      # Upload Build Artifact
      # ------------------------------------------------------------
      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:
      # ------------------------------------------------------------
      # Download Deployment Artifact
      # ------------------------------------------------------------
      - name: Download Deployment Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # ------------------------------------------------------------
      # Show ZIP Before Deployment
      # ------------------------------------------------------------
      - name: Verify ZIP
        run: ls -lh release.zip

      # ------------------------------------------------------------
      # Deploy to Azure Web App
      # ------------------------------------------------------------
      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: nyaysarthi
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip

      # ------------------------------------------------------------
      # Deployment Completed
      # ------------------------------------------------------------
      - name: Deployment Complete
        run: echo "Nyay Sarthi deployed successfully!"